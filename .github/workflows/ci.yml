name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # --ignore-workspace matters for local parity: the tagit monorepo's pnpm
      # workspace otherwise overrides this app's .npmrc node-linker=hoisted.
      - run: pnpm install --ignore-workspace --frozen-lockfile

      - run: npx tsc --noEmit

      - run: npx jest --silent

      # Custody import fence (SEC_TRANSFER_STRIDE.md): the raw-key accessor —
      # and the expo-secure-store surface it guards — may only be referenced
      # inside src/wallet/.
      - name: Custody import fence
        run: |
          hits=$(grep -rlnE "getSigningKey|secureKeyStore|expo-secure-store" . \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' \
            --exclude-dir=node_modules --exclude-dir=.git 2>/dev/null \
            | grep -vE '^(\./)?src/wallet/' || true)
          if [ -n "$hits" ]; then
            echo "Custody surface referenced outside src/wallet/:"; echo "$hits"; exit 1
          fi
